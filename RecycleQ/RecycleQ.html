<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .image-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-container img {
            max-width: 100%;
            max-height: 100%;
        }
        .buttons-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 20px;
        }
        .buttons-container button {
            flex: 1;
            margin: 0 10px;
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="your-image-url.jpg" alt="Quiz Image">
    </div>
    <div class="buttons-container">
        <img src="option1-image-url.jpg" alt="Option 1">
        <img src="option2-image-url.jpg" alt="Option 2">
        <img src="option3-image-url.jpg" alt="Option 3">
        <img src="option4-image-url.jpg" alt="Option 4">
        <img src="option5-image-url.jpg" alt="Option 5">
        <img src="option6-image-url.jpg" alt="Option 6">
    </div>
    </div>
</body>
</html>
