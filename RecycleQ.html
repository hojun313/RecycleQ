<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .image-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-container img {
            max-width: 100%;
            max-height: 100%;
        }
        .buttons-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .buttons-container img {
            width: 10%;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="" alt="Quiz Image">
    </div>
    <div class="buttons-container">
        <button src="/assets/기타종이.png" alt="Option 1" onclick="isPaper">
        <img src="/assets/비닐류.png" alt="Option 2" onclick="isVin">
        <button src="/assets/상자류.png" alt="Option 3">
        <img src="/assets/유리.png" alt="Option 4">
        <img src="/assets/종이팩.png" alt="Option 5">
        <img src="/assets/투명페트.png" alt="Option 6">
        <img src="/assets/플라스틱.png" alt="Option 7">
    </div>
    </div>
    <script>
        var imgs = ['/assets/Quiz/1_1_pet.png',
            '/assets/Quiz/1_2_pla.png',
            '/assets/Quiz/1_3_can.png',
            '/assets/Quiz/1_4_gla.png',
            '/assets/Quiz/1_5_can.png',
            '/assets/Quiz/1_6_pla.png',
            '/assets/Quiz/1_7_pla.png',
            '/assets/Quiz/1_8_pla.png',
            '/assets/Quiz/1_9_pla.png',
            ];
        var rand = Math.floor(Math.random() * imgs.length);
        document.querySelector('.image-container img').src = imgs[rand];

        function isPaper() {
            if (rand == 0 || rand == 4 || rand == 5 || rand == 6 || rand == 7 || rand == 8) {
                alert("정답입니다!");
            } else {
                alert("오답입니다!");
            }
        }
        function isVin() {
            if (rand == 1) {
                alert("정답입니다!");
            } else {
                alert("오답입니다!");
            }
        }
    </script>
</body>
</html>
